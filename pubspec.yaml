name: dompetku
description: Aplikasi manajemen keuangan pribadi DompetKu
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.1

  # Database Lokal
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Grafik & Chart
  fl_chart: ^0.68.0

  # Utilitas UI
  intl: ^0.19.0
  google_fonts: ^6.2.1
  animate_do: ^3.3.4
  lottie: ^3.1.0
  flutter_svg: ^2.0.10+1
  shimmer: ^3.0.0

  # Ikon Tambahan
  cupertino_icons: ^1.0.6
  flutter_iconly: ^1.0.2

  # Uuid Generator
  uuid: ^4.4.0

  # Shared Preferences (simpan sesi login)
  shared_preferences: ^2.2.3

  # PDF Export
  pdf: ^3.10.8
  printing: ^5.13.1
  path_provider: ^2.1.3
  crypto: ^3.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.9

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
  fonts:
    - family: DompetKu
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
